<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 14 386 72" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B5BDB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B5BDB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Monitor -->
  <rect x="4" y="18" width="64" height="44" rx="5" stroke="url(#iconGrad)" stroke-width="4" fill="none"/>
  <line x1="36" y1="62" x2="36" y2="76" stroke="url(#iconGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="24" y1="76" x2="48" y2="76" stroke="url(#iconGrad)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="36" cy="58" r="2.5" fill="url(#iconGrad)"/>

  <!-- Tablet -->
  <rect x="46" y="26" width="34" height="46" rx="4" stroke="url(#iconGrad)" stroke-width="3.5" fill="white"/>
  <line x1="59" y1="66" x2="67" y2="66" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Phone -->
  <rect x="65" y="36" width="22" height="38" rx="4" stroke="url(#iconGrad)" stroke-width="3.5" fill="white"/>
  <line x1="73" y1="41" x2="79" y2="41" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="76" cy="68" r="2" fill="url(#iconGrad)"/>

  <!-- "View" in dark navy -->
  <text x="100" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="52" fill="#0F172A">View</text>

  <!-- "Portly" in gradient -->
  <text x="226" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="52" fill="url(#textGrad)">Portly</text>
</svg>
